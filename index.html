<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AC — Portfolio</title>

<!-- Google Fonts: Playfair Display (serif) + Inter (sans) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">

<!-- GSAP + ScrollTrigger -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>
/* ============================================================
   RESET
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:clamp(8px,0.833vw,16px);-webkit-text-size-adjust:none;text-size-adjust:none}
body{
  font-family:'Inter',-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility;
  font-variant-ligatures:none;
  background:#fff;
  color:#000;
  overflow-x:hidden;
  overscroll-behavior:none;
}

/* ============================================================
   LAYER 1: BACKGROUND VIDEO (Fixed, z-index: -2)
   ============================================================ */
.bg-video-layer{
  position:fixed;
  inset:0;
  z-index:-2;
  overflow:hidden;
  pointer-events:none;
  user-select:none;
}
.bg-video-layer video{
  width:100%;
  height:100%;
  object-fit:cover;
}
/* Fallback background when no video */
.bg-fallback{
  position:fixed;
  inset:0;
  z-index:-1;
  background:#fff;
  pointer-events:none;
}

/* ============================================================
   LAYER 2: CONTENT WRAPPER (Horizontal Scroll)
   ============================================================ */
.scroll-container{
  position:fixed;
  top:0;
  left:0;
  width:auto;
  height:100vh;
  display:flex;
  flex-direction:row;
  backface-visibility:hidden;
  z-index:2;
}

/* Each section = 100vw × 100vh */
.hero{ z-index:2; }
.section{
  width:100vw;
  height:100vh;
  flex-shrink:0;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}
/* Logo section 允许色盘溢出 */
.section.logo-section{
  overflow:hidden;
  z-index:2;
  isolation:isolate;
}
/* Timeline — overflow hidden prevents parallax bleed into adjacent sections */
.section.timeline-section{
  overflow:hidden;
  z-index:1;
  isolation:isolate;
}

/* ============================================================
   NAVIGATION (Fixed on top of content)
   ============================================================ */
.nav{
  position:fixed;
  top:0;
  left:0;
  width:7rem;
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:2rem 0;
  z-index:50;
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  pointer-events:all;
}
.nav-left{
  display:flex;
  align-items:center;
  justify-content:center;
}
.nav-logo{
  display:flex;
  align-items:center;
  justify-content:center;
  text-decoration:none;
  color:#000;
}
.nav-logo img{
  display:block;
  width:2.5rem;
  height:2.5rem;
}
.nav-brand{
  font-family:'Inter',sans-serif;
  font-size:1.3rem;
  font-weight:400;
  letter-spacing:0.02em;
  color:#000;
  text-decoration:none;
}

.nav-center{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:2.8rem;
}
.nav-group{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:0.35rem;
}
.nav-link{
  font-family:'Inter',sans-serif;
  font-size:1.1rem;
  font-weight:400;
  letter-spacing:0.02em;
  color:#333;
  text-decoration:none;
  transition:color 0.3s ease;
  cursor:pointer;
}
.nav-link:hover{color:#000}
.nav-link.active{color:#000}
.nav-parent{font-weight:600;font-size:1.3rem;letter-spacing:0.01em;}
.nav-child{font-size:0.95rem;color:#666;padding-left:0.4rem;}
.nav-child:hover{color:#000}
.nav-child.active{color:#000}

.nav-right{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Hamburger menu button */
.nav-menu-btn{
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:5px;
  width:2.4rem;
  height:2.4rem;
  cursor:pointer;
  background:none;
  border:none;
  padding:0;
  position:relative;
  z-index:51;
}
.nav-menu-btn span{
  display:block;
  width:20px;
  height:1.5px;
  background:#000;
  transition:transform 0.3s ease, opacity 0.3s ease;
  transform-origin:center;
}
.nav-menu-btn.open span:nth-child(1){
  transform:translateY(3.25px) rotate(45deg);
}
.nav-menu-btn.open span:nth-child(2){
  transform:translateY(-3.25px) rotate(-45deg);
}

/* Mobile menu overlay */
.mobile-menu{
  position:fixed;
  inset:0;
  z-index:49;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s ease;
}
.mobile-menu.open{
  opacity:1;
  pointer-events:all;
}
.mobile-menu__inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2.4rem;
}
.mobile-menu__link{
  font-family:'Playfair Display',Georgia,serif;
  font-size:3rem;
  font-weight:600;
  letter-spacing:-0.02em;
  color:#000;
  text-decoration:none;
  cursor:pointer;
  transition:opacity 0.2s ease;
}
.mobile-menu__link:hover{opacity:0.6}
.mobile-menu__link.active{text-decoration:underline;text-underline-offset:8px;text-decoration-thickness:1px;}

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero{
  background:transparent;
  padding:5.6rem 0 0 0;
}
.hero-inner{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  width:100%;
  height:100%;
  padding-top:20vh;
  position:relative;
}
.hero-eyebrow{
  font-family:'Inter',sans-serif;
  font-size:1.1rem;
  font-weight:400;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.45);
  margin-bottom:2.4rem;
}
.hero-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:10rem;
  font-weight:600;
  letter-spacing:-0.03em;
  line-height:1.0;
  color:#000;
  margin-bottom:1.6rem;
}
.hero-title .italic{
  font-style:italic;
  font-weight:500;
}
.hero-tags{
  display:flex;
  flex-direction:column;
  align-items:center;
  align-self:center;
  gap:var(--tag-gap, 3rem);
  margin-top:var(--tag-mt, 4rem);
  margin-bottom:var(--tag-mb, 12vh);
}
/* —— Tag carousel with 3D cube flip —— */
.tag-carousel{
  perspective:800px;
  overflow:visible;
  height:calc(1em * 0.95);
  font-family:'Playfair Display',Georgia,serif;
  font-size:6rem;
  font-weight:600;
  font-style:italic;
  letter-spacing:-0.03em;
  line-height:0.95;
  color:#f4840c;
  opacity:0;
  transform:translateY(2rem);
  transition:opacity 0.7s ease, transform 0.7s ease;
}
.tag-carousel.revealed{
  opacity:1;
  transform:translateY(0);
}
.tag-cube{
  position:relative;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);
}
.tag-face{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  font-family:inherit;
  font-size:inherit;
  font-weight:inherit;
  font-style:inherit;
  letter-spacing:inherit;
  line-height:inherit;
  white-space:nowrap;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.1em;
}
.tag-logo{
  height:0.65em;
  width:auto;
  flex-shrink:0;
}
.hero-subtitle{
  font-family:'Playfair Display',Georgia,serif;
  font-size:3.6rem;
  font-weight:500;
  font-style:italic;
  letter-spacing:-0.02em;
  line-height:1.2;
  color:#000;
  margin-bottom:3.2rem;
  max-width:56rem;
}
.hero-line{
  width:6rem;
  height:1px;
  background:#000;
  margin-bottom:3.2rem;
}
.hero-desc{
  font-family:'Inter',sans-serif;
  font-size:1.35rem;
  font-weight:300;
  letter-spacing:0.02em;
  line-height:1.7;
  color:rgba(0,0,0,0.6);
  max-width:48rem;
}
.hero-scroll-hint{
  position:absolute;
  bottom:3.6rem;
  left:calc(100vw - 10rem);
  z-index:101;
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:0.6rem;
  pointer-events:none;
}
.hero-scroll-hint span{
  font-family:'Inter',sans-serif;
  font-size:1rem;
  font-weight:400;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.4);
}
.hero-scroll-arrow{
  display:flex;
  align-items:center;
  gap:0.4rem;
  animation:arrowPulse 2s ease-in-out infinite;
}
.hero-scroll-arrow svg{
  width:1.8rem;
  height:1.8rem;
}
@keyframes arrowPulse{
  0%,100%{transform:translateX(0);opacity:0.4}
  50%{transform:translateX(6px);opacity:1}
}

/* ============================================================
   PROJECTS SECTION
   ============================================================ */
.projects{
  background:#fff;
  padding:5.6rem 0 0 0;
}
.projects-inner{
  display:flex;
  flex-direction:column;
  justify-content:center;
  width:100%;
  height:100%;
  padding:0 12%;
}
.projects-label{
  font-family:'Inter',sans-serif;
  font-size:1.1rem;
  font-weight:400;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.45);
  margin-bottom:4rem;
}
.projects-grid{
  display:flex;
  flex-direction:row;
  gap:4rem;
  width:100%;
}
.project-card{
  flex:1;
  cursor:pointer;
  position:relative;
}
.project-card-number{
  font-family:'Inter',sans-serif;
  font-size:1rem;
  font-weight:400;
  letter-spacing:0.1em;
  color:rgba(0,0,0,0.3);
  margin-bottom:1.6rem;
}
.project-card-image{
  width:100%;
  aspect-ratio:4/3;
  background:#f0f0f0;
  margin-bottom:2rem;
  overflow:hidden;
  position:relative;
}
.project-card-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  transition:transform 0.6s cubic-bezier(0.23,1,0.32,1);
}
.project-card:hover .project-card-image img{
  transform:scale(1.04);
}
.project-card-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:2.4rem;
  font-weight:600;
  letter-spacing:-0.02em;
  color:#000;
  margin-bottom:0.6rem;
}
.project-card-meta{
  font-family:'Inter',sans-serif;
  font-size:1.1rem;
  font-weight:400;
  letter-spacing:0.02em;
  color:rgba(0,0,0,0.45);
}
.project-card-line{
  width:100%;
  height:1px;
  background:#e5e5e5;
  margin-top:2rem;
  transition:background 0.3s ease;
}
.project-card:hover .project-card-line{
  background:#000;
}

/* ============================================================
   CUSTOM CURSOR — only active inside Timeline section
   ============================================================ */
/* .timeline-section,.timeline-section *{cursor:none} */

.tl-cursor{
  position:fixed;
  z-index:10000;
  pointer-events:none;
  top:0;left:0;
  backface-visibility:hidden;
}
.tl-cursor-dot{
  width:60px;               /* ← 改这里调图标大小 */
  height:auto;
  position:absolute;
  left:0;top:0;
  transform:translateY(-100%);
  transform-origin:left bottom;
  pointer-events:none;
}
.tl-cursor-card{
  position:absolute;
  top:50%;left:50%;
  width:440px;height:250px;
  background:#000;              /* fallback behind image */
  box-shadow:0 12px 60px rgba(0,0,0,0.12),0 3px 10px rgba(0,0,0,0.08);
  overflow:hidden;
  opacity:0;
  pointer-events:none;
  clip-path:circle(4px at 50% 50%);
  transform:translate(-50%,-50%) scale(0.4);
}
.tl-cursor-card-image{
  position:absolute;
  inset:0;
  overflow:hidden;
}
.tl-cursor-card-image img{
  width:100%;height:100%;
  object-fit:cover;
}
.tl-cursor-card-info{
  position:absolute;
  left:0;right:0;bottom:0;
  padding:1rem 1.3rem;
  display:flex;
  flex-direction:column;
  gap:0.1rem;
  background:rgba(0,0,0,0.25);
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
}
.tl-cursor-card-category{
  font-family:'Inter',sans-serif;
  font-size:0.62rem;font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.75);
  margin-bottom:0.15rem;
}
.tl-cursor-card-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:1.3rem;font-weight:600;
  letter-spacing:-0.02em;
  color:#fff;
  margin:0;line-height:1.15;
}
.tl-cursor-card-date{
  font-family:'Inter',sans-serif;
  font-size:0.68rem;font-weight:400;
  color:rgba(255,255,255,0.65);
  margin-top:0.1rem;
}
.tl-cursor-card-desc{
  font-family:'Inter',sans-serif;
  font-size:0.7rem;font-weight:300;
  line-height:1.45;
  color:rgba(255,255,255,0.7);
  margin-top:0.2rem;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

/* ============================================================
   TIMELINE SECTION (Swiss Style) — responsive via clamp()
   ============================================================ */
.timeline-section{
  background:#fafafa;
  padding:0;
  overflow:hidden;
}
.tl-container{
  width:100%;height:100%;
  display:flex;
  flex-direction:column;
  position:relative;
}
.tl-title{
  font-family:'Playfair Display',Georgia,serif;
  font-size:10rem;
  font-weight:600;
  letter-spacing:-0.03em;
  line-height:1.0;
  color:#000;
  position:absolute;
  top:40vh;
  left:12.5rem;
  margin:0;
  pointer-events:none;
  user-select:none;
  text-shadow:0 8px 80px rgba(0,0,0,0.1),0 2px 8px rgba(0,0,0,0.06),0 0 180px rgba(0,0,0,0.04);
}
.tl-grid-outer{
  flex:1;
  display:flex;
  padding:clamp(8rem,12vh,10rem) clamp(3rem,4.5vw,5rem) clamp(2rem,4vh,3.5rem) clamp(3rem,4.5vw,5rem);
  position:relative;
}
.tl-month-labels{
  display:flex;
  flex-direction:column;
  flex-shrink:0;
  width:clamp(2.4rem,3.5vw,3.8rem);
  position:relative;
  z-index:5;
  padding:0.15rem 0;
}
.tl-month-label{
  flex:1;
  display:flex;
  align-items:center;
  font-family:'Helvetica Neue','Helvetica','Inter',sans-serif;
  font-size:clamp(0.48rem,0.62vw,0.62rem);font-weight:500;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:rgba(0,0,0,0.22);
  line-height:1;
}
.tl-year-columns{
  display:flex;
  flex:1;
  position:relative;
}
.tl-year-col{
  flex:1;
  position:relative;
  border-right:1px solid rgba(0,0,0,0.06);
  display:flex;
  flex-direction:column;
  padding-top:0.15rem;
}
.tl-year-col:last-child{border-right:none}
.tl-year-label{
  font-family:'Inter',sans-serif;
  font-size:clamp(1rem,1.2vw,1.2rem);font-weight:600;
  letter-spacing:-0.02em;
  color:rgba(0,0,0,1);
  position:absolute;
  top:clamp(-2.8rem,-3.2vh,-2rem);
  left:0.3rem;
}
.tl-month-row{
  flex:1;
  position:relative;
  border-bottom:1px solid rgba(0,0,0,0.035);
}
.tl-month-row:last-child{border-bottom:none}

/* Project Nodes */
.tl-node{
  width:6px;height:6px;
  border-radius:50%;
  background:#000;
  display:block;
  flex-shrink:0;
}
.tl-node.accent{background:#e63946}

.tl-node-cluster{
  position:absolute;
  left:50%;top:50%;
  transform:translate(-50%,-50%);
  display:flex;
  gap:3px;
  z-index:6;
  pointer-events:none;
}

/* Crosshair */
.tl-crosshair{
  position:absolute;
  inset:0;
  pointer-events:none;
  z-index:8;
  opacity:0;
}
.tl-crosshair-h,.tl-crosshair-v{
  position:absolute;
  background:rgba(0,0,0,0.08);
  pointer-events:none;
}
.tl-crosshair-h{left:0;right:0;height:1px}
.tl-crosshair-v{top:0;bottom:0;width:1px}

/* ============================================================
   ORBIT NAV — text + white invert overlay clipped by blob shape
   ============================================================ */
.orbit-text-stack{
  position:absolute;
  top:40vh;
  left:16rem;
  transform:translateY(-50%);
  z-index:10;
  isolation:isolate;
}
.orbit-nav{
  display:flex;
  flex-direction:column;
  gap:clamp(1rem,2vh,1.8rem);
  position:relative;
}
.orbit-nav-link{
  display:inline-flex;
  align-items:center;
  gap:1.2rem;
  text-decoration:none;
  color:#000;
  position:relative;
  padding-bottom:6px;
  cursor:pointer;
  width:fit-content;
  opacity:0;
  transform:translateY(2rem);
  transition:opacity 0.7s cubic-bezier(0.19,1,0.22,1),
             transform 0.7s cubic-bezier(0.19,1,0.22,1);
}
.orbit-nav-link:nth-child(1){ transition-delay:0s; }
.orbit-nav-link:nth-child(2){ transition-delay:0.12s; }
.orbit-nav-link:nth-child(3){ transition-delay:0.24s; }
.orbit-nav-link.revealed{
  opacity:1;
  transform:translateY(0);
}
.orbit-nav-link::after{
  content:'';
  position:absolute;
  left:0;bottom:0;
  width:100%;height:1px;
  background:#000;
  transform:scaleX(0);
  transform-origin:left center;
  transition:transform 0.4s cubic-bezier(0.19,1,0.22,1);
}
.orbit-nav-link:hover::after{ transform:scaleX(1); }
.orbit-nav-text{
  font-family:'Playfair Display',Georgia,serif;
  font-size:clamp(4.8rem,6.4vw,6.4rem);
  font-weight:600;
  letter-spacing:-0.02em;
  paint-order:stroke fill;
  filter:drop-shadow(2px 2px 20px #fff) drop-shadow(2px 2px 20px #fff) drop-shadow(2px 2px 20px #fff);
}
.orbit-nav-arrow{
  width:clamp(3.2rem,4.8vw,4.8rem);
  height:auto;
  display:block;
  transition:transform 0.35s cubic-bezier(0.19,1,0.22,1);
  filter:drop-shadow(2px 2px 20px #fff) drop-shadow(2px 2px 20px #fff) drop-shadow(2px 2px 20px #fff);
}
.orbit-nav-link:hover .orbit-nav-arrow{ transform:translateY(-6px); }

/* ============================================================
   ORBIT SECTION — Mechanical Pen Orbit System
   ============================================================ */
.orbit-section{
  background:#fff;
  padding:0;
  overflow:hidden;
}
/* 3D stage — provides the perspective vanishing point */
.orbit-stage{
  width:100%;height:100%;
  perspective:1200px;                /* ← 透视距离（越小越夸张） */
  perspective-origin:center center;
}
/* Scene tilted in 3D space — all children rendered in this tilted plane */
.orbit-scene{
  position:relative;
  width:100%;height:100%;
  /* no preserve-3d — avoids per-child 3D layers that cause aliasing */
}
/* Orbit ring — position set dynamically by JS */
.orbit-ring-svg{
  position:absolute;
  transform:translate(-50%,-50%);
  pointer-events:none;
  overflow:visible;
}
/* Pivot */
.orbit-pivot{
  position:absolute;
  width:3px;height:3px;
  border-radius:50%;
  background:rgba(0,0,0,0.25);
  pointer-events:none;
}
/* Outer filled circle — same ray, larger radius */
.orbit-outer{
  position:absolute;
  border-radius:50%;
  background:#000;
  pointer-events:none;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
/* Circle at opposite end of arm */
.orbit-circle{
  position:absolute;
  border-radius:50%;
  background:#000;
  pointer-events:none;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
/* Pen logo */
.orbit-pen{
  position:absolute;
  pointer-events:none;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
}
.orbit-pen img{
  width:28px;            /* ← 改这里调笔的大小（等比缩放，高≈宽×4） */
  height:auto;
  display:block;
  transform:scaleY(-1) translateZ(0);  /* 垂直翻转 + GPU 层 */
  image-rendering:auto;
  -webkit-backface-visibility:hidden;

<script>
(function(){
  'use strict';

  // ========== APPLE DEVICE — Safari: swap WebM → HEVC .mov (native alpha) ==========
  var isApple = /iPhone|iPad|iPod/.test(navigator.userAgent) ||
                (/Mac/.test(navigator.userAgent) && !/Chrome/.test(navigator.userAgent));
  var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  var pcVid = document.getElementById('pc-alpha-video');
  var bgVid = document.getElementById('bg-alpha-video');
  if(isApple){
    document.body.classList.add('is-apple');
    if(isIOS){
      if(pcVid) pcVid.src = 'public/pc_prores4444.mov';
      if(bgVid) bgVid.src = 'public/bg_alpha_desktop_ios.mov';
    } else {
      if(pcVid) pcVid.src = 'public/pc_prores4444.mov';
      if(bgVid) bgVid.src = 'public/bg_alpha_desktop_hevc.mov';
    }
  } else {
    // Windows/Chrome: WebM
    if(pcVid) pcVid.src = 'public/pc_alpha_desktop.webm';
    if(bgVid) bgVid.src = 'public/bg_alpha_desktop.webm';
  }
  if(isIOS){
    document.body.classList.add('is-ios');
  }

  // ========== DOM REFS ==========
  const scrollContainer = document.getElementById('scroll-container');
  const progressBar = document.getElementById('progress-bar');
  const pcAlphaVideo = document.getElementById('pc-alpha-video');
  const bgAlphaVideo = document.getElementById('bg-alpha-video');
  const navLinks = document.querySelectorAll('.nav-link');
  const navMenuBtn = document.getElementById('nav-menu-btn');
  const mobileMenu = document.getElementById('mobile-menu');
  const mobileMenuLinks = document.querySelectorAll('.mobile-menu__link');
  const heroTitle = document.querySelector('.hero-title');
  const heroScrollHint = document.querySelector('.hero-scroll-hint');
  const heroTags = document.getElementById('hero-tags');
  const carousels = document.querySelectorAll('.tag-carousel');
  const carouselCubes = document.querySelectorAll('.tag-cube');
  const fadeEls = document.querySelectorAll('.fade-in');
  let menuOpen = false;
  let tagsRevealed = false;
  let aboutRevealed = false;

  // ========== TAG CAROUSEL DATA ==========
  // Edit these arrays to change the rotating text on each line
  const carouselWords = [
    [
      { text: 'Designs', logo:'icons/design.svg', font: "'Inter',sans-serif", color: '#808080', fontStyle: 'normal' },
      { text: 'Notes', logo:'icons/note.svg', font: "'Inter',sans-serif", color: '#808080', fontStyle: 'normal' },
      { text: 'Projects', logo:'icons/project.svg', font: "'Inter',sans-serif", color: '#808080', fontStyle: 'normal' },
    ],
    [

    
      { text: 'Society', logo: '', font: "'Playfair Display',Georgia,serif", color: '#000',  },
      { text: 'The Future', logo: '', font: "'Playfair Display',Georgia,serif", color: '#000' },
      { text: 'Theory', logo: '', font: "'Playfair Display',Georgia,serif", color: '#000' },
    ],
    [
      { text: 'Industrial Design', logo: '', font: "'Inter',sans-serif", color: 'f4840c', fontStyle: 'normal'  },
      { text: 'Graphics', logo: '', font: "'Inter',sans-serif", color: 'f4840c', fontStyle: 'normal' },
      { text: 'Interaction Design', logo: '', font: "'Inter',sans-serif", color: 'f4840c', fontStyle: 'normal' },
    ]
  ];
  let carouselTimers = [null, null, null];

  // ========== BUILD 3D CAROUSEL FACES ==========
  function buildCarousels(){
    carouselCubes.forEach((cube, ci) => {
      const words = carouselWords[ci] || carouselWords[0];
      const n = words.length;
      const angleStep = 360 / n;

      // Get the carousel's computed height for accurate translateZ
      const carousel = cube.parentElement;
      const h = carousel ? carousel.offsetHeight : 60;
      const tz = (h / 2).toFixed(1);

      const defaultLogo = 'public/AC_LOGO_SVG.svg';

      words.forEach((word, fi) => {
        const face = document.createElement('div');
        face.className = 'tag-face';
        const w = typeof word === 'object' ? word : { text: word };
        const hasLogo = typeof w.logo !== 'undefined';
        const logoSrc = hasLogo ? w.logo : defaultLogo;
        face.innerHTML = logoSrc ? `<img src="${logoSrc}" class="tag-logo">` + w.text : w.text;
        if(w.color)     face.style.color     = w.color;
        if(w.font)      face.style.fontFamily = w.font;
        if(w.fontStyle) face.style.fontStyle  = w.fontStyle;
        face.style.transform = `rotateX(${fi * angleStep}deg) translateZ(${tz}px)`;
        cube.appendChild(face);
      });
    });
  }

  // ========== CAROUSEL ROTATION ==========
  function rotateCarousel(ci){
    const cube = carouselCubes[ci];
    if(!cube) return;
    const words = carouselWords[ci] || carouselWords[0];
    const n = words.length;
    const angleStep = 360 / n;
    const currentAngle = parseFloat(cube.dataset.angle || '0');
    const nextIndex = ((parseInt(cube.dataset.index || '0')) + 1) % n;
    const targetAngle = currentAngle + angleStep;

    cube.dataset.index = nextIndex;
    cube.dataset.angle = targetAngle;
    cube.style.transform = `rotateX(${-targetAngle}deg)`;
  }

  function startCarousels(){
    // Stagger: each carousel starts 1s after the previous
    carouselCubes.forEach((cube, ci) => {
      cube.dataset.index = '0';
      cube.dataset.angle = '0';
      cube.style.transform = 'rotateX(0deg)';
      const delay = ci * 1000;
      setTimeout(() => {
        rotateCarousel(ci); // first flip after delay
        carouselTimers[ci] = setInterval(() => rotateCarousel(ci), 2500);
      }, delay);
    });
  }

  function stopCarousels(){
    carouselTimers.forEach(t => clearInterval(t));
    carouselTimers = [null, null, null];
  }

  // ========== REGISTER GSAP PLUGINS ==========
  gsap.registerPlugin(ScrollTrigger);

  // ========== STATE ==========
  let totalSections = 4;
  let scrollProgress = 0;

  // ========== INIT FOREGROUND VIDEOS (synchronized, play once, hold last frame) ==========
  function initForegroundVideos(){
    // Master: pcAlphaVideo  |  Slave: bgAlphaVideo
    var master = pcAlphaVideo, slave = bgAlphaVideo;
    if(!master) return;

    // Sync slave to master (drift correction every 200ms)
    var syncInterval;
    function startSync(){
      syncInterval = setInterval(function(){
        if(master.readyState < 2 || slave.readyState < 2) return;
        var drift = Math.abs(master.currentTime - slave.currentTime);
        if(drift > 0.06){
          slave.currentTime = master.currentTime;
        }
      }, 200);
    }
    function stopSync(){
      clearInterval(syncInterval);
    }

    // Pause at last frame — don't loop
    master.addEventListener('ended', function(){
      master.pause();
      if(slave) slave.pause();
      stopSync();
    });
    master.addEventListener('pause', function(){
      if(slave && !slave.paused) slave.pause();
      stopSync();
    });
    master.addEventListener('play', function(){
      if(slave && slave.paused) slave.play().catch(function(){});
      startSync();
    });
    master.addEventListener('seeked', function(){
      if(slave) slave.currentTime = master.currentTime;
    });

    // Monitor master video progress → reveal carousels sequentially near end
    var revealIndex = 0;
    master.addEventListener('timeupdate', function(){
      if(tagsRevealed || !master.duration) return;
      var pct = master.currentTime / master.duration;
      var thresholds = [0.80, 0.80, 0.80];
      while(revealIndex < thresholds.length && pct > thresholds[revealIndex]){
        var carousel = carousels[revealIndex];
        if(carousel) carousel.classList.add('revealed');
        revealIndex++;
      }
      if(revealIndex >= thresholds.length){
        tagsRevealed = true;
        startCarousels();
      }
    });

    // Also apply to slave for the rare case master fails to play but slave succeeds
    if(slave){
      slave.addEventListener('ended', function(){ slave.pause(); stopSync(); });
    }

    // Ensure playback; fallback on user interaction if autoplay blocked
    function play(){
      if(master.paused && !master.ended){
        master.play().then(function(){
          if(slave && slave.paused && !slave.ended){
            slave.currentTime = master.currentTime;
            slave.play().catch(function(){});
            startSync();
          }
        }).catch(function(){});
      }
    }
    if(master.paused && !master.ended) play();
    ['click','wheel','touchstart','keydown'].forEach(function(evt){
      document.addEventListener(evt, play, { once: true });
    });
  }

  // ========== GSAP HORIZONTAL SCROLL SETUP ==========
  function setupHorizontalScroll(){
    const sections = gsap.utils.toArray('.section');
    const totalSectionsCount = sections.length;
    totalSections = totalSectionsCount;

    // Cache expensive querySelector calls (used in onUpdate at scroll-frame rate)
    const tlContainer = document.querySelector('.tl-container');
    const tlMonthLabels = document.getElementById('tl-month-labels');
    const tlTitle = document.querySelector('.tl-title');
    const orbitNavLinks = document.querySelectorAll('.orbit-nav-link');

    // Calculate total scroll distance
    const totalScrollDist = () => {
      return scrollContainer.scrollWidth - window.innerWidth;
    };

    // Set body height to allow scrolling the full horizontal distance
    const setBodyHeight = () => {
      const dist = totalScrollDist();
      document.body.style.height = Math.max(dist + window.innerHeight, window.innerHeight) + 'px';
    };
    setBodyHeight();

    // Create the scroll-driven horizontal animation
    // The container has position:fixed so it's already pinned to viewport.
    // We just animate its translateX based on scroll position.
    gsap.to(scrollContainer, {
      x: () => -totalScrollDist(),
      ease: 'none',
      scrollTrigger: {
        trigger: 'body',
        start: 'top top',
        end: 'bottom bottom',
        scrub: isIOS ? 0.4 : 1.2,
        invalidateOnRefresh: true,
        onUpdate: (self) => {
          applyParallax(self.progress);
        }
      }
    });

    // Store for resize
    return { setBodyHeight };
  }

  // ========== PARALLAX — standalone so mobile swipe can drive it too ==========
  function applyParallax(progress){
    scrollProgress = progress;
    var vw = window.innerWidth;

    // Hero parallax
    var pX = progress * (totalSections - 1) * vw * 0.4;
    if(heroTitle)       heroTitle.style.transform = 'translateX(' + pX + 'px)';
    if(heroScrollHint)  heroScrollHint.style.transform = 'translateX(' + (pX * 0.12) + 'px)';

    // Carousel parallax
    carousels.forEach(function(c){
      var speed = parseFloat(c.getAttribute('data-parallax')) || 0.3;
      c.style.transform = 'translateX(' + (progress * (totalSections - 1) * vw * speed) + 'px)';
    });

    // Timeline grid parallax
    var tlSectionIdx = 2;
    var tlLocal = progress - tlSectionIdx / (totalSections - 1);
    var tlContainerEl = document.querySelector('.tl-container');
    if(tlContainerEl){
      tlContainerEl.style.transform = 'translateX(' + (tlLocal * (totalSections - 1) * vw * 0.18) + 'px)';
    }

    // Month labels pinning
    var containerShift = tlLocal * (totalSections - 1) * vw * 0.18;
    var sectionLeft = vw * (tlSectionIdx - progress * (totalSections - 1));
    var gridPadPx = vw * 0.05;
    var labelNatural = sectionLeft + gridPadPx + containerShift;
    var pinTarget = vw * 0.20;
    var tlMonthLabelsEl = document.getElementById('tl-month-labels');
    if(tlMonthLabelsEl){
      if(labelNatural < pinTarget && sectionLeft > -vw * 0.7){
        var shift = Math.min(pinTarget - labelNatural, vw * 0.5);
        tlMonthLabelsEl.style.transform = 'translateX(' + shift + 'px)';
      } else {
        tlMonthLabelsEl.style.transform = 'translateX(0px)';
      }
    }

    // Posts title parallax
    var tlTitleEl = document.querySelector('.tl-title');
    if(tlTitleEl){
      tlTitleEl.style.transform = 'translateX(' + (tlLocal * (totalSections - 1) * vw * 0.32) + 'px)';
    }

    // About links reveal
    if(!aboutRevealed && progress > 0.78){
      aboutRevealed = true;
      document.querySelectorAll('.orbit-nav-link').forEach(function(l){ l.classList.add('revealed'); });
    }

    // Progress bar
    progressBar.style.transform = 'scaleX(' + progress + ')';

    // Nav highlight
    var activeIndex = Math.round(progress * (totalSections - 1));
    navLinks.forEach(function(l){
      var idx = parseInt(l.getAttribute('data-section'));
      l.classList.toggle('active', idx === activeIndex);
    });
    mobileMenuLinks.forEach(function(l){
      var idx = parseInt(l.getAttribute('data-section'));
      l.classList.toggle('active', idx === activeIndex);
    });

    // Fade-in reveals
    fadeEls.forEach(function(el){
      var section = el.closest('.section');
      if(!section) return;
      var sIdx = parseInt(section.getAttribute('data-index'));
      var sProg = totalSections > 1 ? sIdx / (totalSections - 1) : 0;
      if(progress >= sProg - 0.08) el.classList.add('visible');
    });
  }

  // ========== MOBILE MENU TOGGLE ==========
  function toggleMenu(){
    menuOpen = !menuOpen;
    navMenuBtn.classList.toggle('open', menuOpen);
    mobileMenu.classList.toggle('open', menuOpen);
    document.body.style.overflow = menuOpen ? 'hidden' : '';
  }

  function closeMenu(){
    if(!menuOpen) return;
    menuOpen = false;
    navMenuBtn.classList.remove('open');
    mobileMenu.classList.remove('open');
    document.body.style.overflow = '';
  }

  if(navMenuBtn){
    navMenuBtn.addEventListener('click', toggleMenu);
  }

  // Close menu on Escape
  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && menuOpen) closeMenu();
  });

  // ========== NAV CLICK → SCROLL TO SECTION ==========
  function scrollToSection(sectionIdx){
    const vw = window.innerWidth;
    const totalWidth = (totalSections - 1) * vw;
    const targetX = sectionIdx * vw;
    const docH = document.documentElement.scrollHeight - window.innerHeight;
    const targetScrollY = totalWidth > 0 ? (targetX / totalWidth) * docH : 0;
    window.scrollTo({ top: targetScrollY, behavior: 'smooth' });
    closeMenu();
  }

  navLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      scrollToSection(parseInt(link.getAttribute('data-section')));
    });
  });

  mobileMenuLinks.forEach(link => {
    link.addEventListener('click', (e) => {
      e.preventDefault();
      scrollToSection(parseInt(link.getAttribute('data-section')));
    });
  });

  // ========== KEYBOARD NAVIGATION ==========
  document.addEventListener('keydown', (e) => {
    const vw = window.innerWidth;
    const totalWidth = (totalSections - 1) * vw;
    const docH = document.documentElement.scrollHeight - window.innerHeight;

    if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){
      e.preventDefault();
      const currentSection = Math.round(scrollProgress * (totalSections - 1));
      const nextSection = Math.min(currentSection + 1, totalSections - 1);
      const targetX = nextSection * vw;
      const targetScrollY = totalWidth > 0 ? (targetX / totalWidth) * docH : 0;
      window.scrollTo({ top: targetScrollY, behavior: 'smooth' });
    } else if(e.key === 'ArrowLeft' || e.key === 'ArrowUp'){
      e.preventDefault();
      const currentSection = Math.round(scrollProgress * (totalSections - 1));
      const prevSection = Math.max(currentSection - 1, 0);
      const targetX = prevSection * vw;
      const targetScrollY = totalWidth > 0 ? (targetX / totalWidth) * docH : 0;
      window.scrollTo({ top: targetScrollY, behavior: 'smooth' });
    }
  });

  // ========== INIT ==========
  let scrollSetup = null;

  function init(){
    // Build 3D carousel faces
    buildCarousels();

    // Show hero content
    setTimeout(() => {
      fadeEls.forEach(el => {
        const section = el.closest('.section');
        if(section && parseInt(section.getAttribute('data-index')) === 0){
          el.classList.add('visible');
        }
      });
    }, 400);

    // Init foreground videos (pc_alpha at left + bg_alpha fullscreen)
    initForegroundVideos();

    // Setup GSAP horizontal scroll
    scrollSetup = setupHorizontalScroll();

    // Trigger ScrollTrigger refresh after everything loads
    window.addEventListener('load', () => {
      ScrollTrigger.refresh();
    });

    console.log('%c AC Portfolio %c Ready %c— GSAP Horizontal Scroll Active',
      'font-size:1.4rem;font-weight:600;',
      'font-size:1rem;color:#666;',
      'color:#999;');
  }

  // ========== RESIZE HANDLER ==========
  let resizeTimeout;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      if(scrollSetup && scrollSetup.setBodyHeight){
        scrollSetup.setBodyHeight();
      }
      ScrollTrigger.refresh();
      // Recalculate carousel translateZ after font-size/height changes
      carouselCubes.forEach((cube, ci) => {
        const carousel = cube.parentElement;
        if(!carousel) return;
        const h = carousel.offsetHeight;
        const tz = (h / 2).toFixed(1);
        const words = carouselWords[ci] || carouselWords[0];
        const n = words.length;
        const angleStep = 360 / n;
        cube.querySelectorAll('.tag-face').forEach((face, fi) => {
          face.style.transform = `rotateX(${fi * angleStep}deg) translateZ(${tz}px)`;
        });
      });
    }, 250);
  });

  // ========== MOBILE HORIZONTAL SWIPE (velocity-based, native-feel) ==========
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  if(isMobile){
    document.body.classList.add('is-mobile');
    document.body.style.overflow = 'hidden';
    document.documentElement.style.overflow = 'hidden';
    var logoMount = document.getElementById('logo-mount');
    if(logoMount) logoMount.style.touchAction = 'none';

    (function(){
      var tx = 0, vx = 0, touching = false, lastX = 0, lastTime = 0, inertiaRaf = 0;

      function getDist(){ return scrollContainer.scrollWidth - window.innerWidth; }
      function clamp(v){ var m = -getDist(); return Math.max(m, Math.min(0, v)); }
      function stopInertia(){ if(inertiaRaf){ cancelAnimationFrame(inertiaRaf); inertiaRaf = 0; } }

      function setTx(x){
        tx = x;
        scrollContainer.style.transform = 'translateX(' + x + 'px)';
        var d = getDist();
        applyParallax(d > 0 ? -x / d : 0);
      }

      document.addEventListener('touchstart', function(e){
        if(e.touches.length !== 1) return;
        var lm = document.getElementById('logo-mount');
        if(lm){
          var r = lm.getBoundingClientRect();
          var cx = r.left + r.width/2, cy = r.top + r.height/2;
          if(Math.hypot(e.touches[0].clientX - cx, e.touches[0].clientY - cy) < 200) return;
        }
        stopInertia();
        lastX = e.touches[0].clientX;
        lastTime = performance.now();
        vx = 0;
        var m = new DOMMatrixReadOnly(getComputedStyle(scrollContainer).transform);
        tx = m.m41;
        touching = true;
      }, { passive: true });

      document.addEventListener('touchmove', function(e){
        if(!touching) return;
        var x = e.touches[0].clientX;
        var dx = x - lastX;
        var dt = performance.now() - lastTime;
        vx = dt > 0 ? dx / dt : 0;
        setTx(clamp(tx + dx));
        lastX = x;
        lastTime = performance.now();
      }, { passive: true });

      document.addEventListener('touchend', function(){
        if(!touching) return;
        touching = false;
        if(Math.abs(vx) > 0.1){
          stopInertia();
          (function step(){
            if(Math.abs(vx) < 0.03){ inertiaRaf = 0; return; }
            vx *= 0.95;
            setTx(clamp(tx + vx * 16));
            inertiaRaf = requestAnimationFrame(step);
          })();
        }
      }, { passive: true });
    })();
  }

  // ========== START ==========
  init();

})();
</script>

  // ============================================================

  // ============================================================
  function placeNodes(){
    var oldNodes = gridOuter.querySelectorAll('.tl-node-cluster');
    for(var i = 0; i < oldNodes.length; i++){ oldNodes[i].remove(); }

    var cellMap = {};
    projects.forEach(function(p){
      var key = p.year + '|' + p.month;
      if(!cellMap[key]) cellMap[key] = [];
      cellMap[key].push(p);
    });

    var cols = yearColumns.querySelectorAll('.tl-year-col');

    Object.keys(cellMap).forEach(function(key){
      var projs = cellMap[key];
      var first = projs[0];
      var yIdx = CONFIG.years.indexOf(first.year);
      var mIdx = first.month - 1;
      if(yIdx < 0 || mIdx < 0 || yIdx >= cols.length) return;

      var rows = cols[yIdx].querySelectorAll('.tl-month-row');
      if(mIdx >= rows.length) return;
      var row = rows[mIdx];

      var cluster = document.createElement('div');
      cluster.className = 'tl-node-cluster';
      projs.forEach(function(p){
        var dot = document.createElement('div');
        dot.className = 'tl-node' + (p.color === CONFIG.accentColor ? ' accent' : '');
        dot.setAttribute('data-id', p.id);
        cluster.appendChild(dot);
      });
      row.appendChild(cluster);
    });
  }

  // ============================================================
  //  COMPUTE NODE VIEWPORT POSITIONS (runs every ~133ms)
  // ============================================================
  function updateNodeTargets(){
    nodeTargets = [];
    var cols = yearColumns.querySelectorAll('.tl-year-col');

    var cellGroups = {};
    projects.forEach(function(p){
      var key = p.year + '|' + p.month;
      if(!cellGroups[key]) cellGroups[key] = [];
      cellGroups[key].push(p);
    });

    Object.keys(cellGroups).forEach(function(key){
      var projs = cellGroups[key];
      var first = projs[0];
      var yIdx = CONFIG.years.indexOf(first.year);
      var mIdx = first.month - 1;
      if(yIdx < 0 || mIdx < 0 || yIdx >= cols.length) return;

      var rows = cols[yIdx].querySelectorAll('.tl-month-row');
      if(mIdx >= rows.length) return;
      var row = rows[mIdx];
      var rect = row.getBoundingClientRect();
      var baseCX = rect.left + rect.width / 2;
      var baseCY = rect.top + rect.height / 2;
      var count = projs.length;

      projs.forEach(function(p, idx){
        var offsetX = (idx - (count - 1) / 2) * 7;
        nodeTargets.push({ project: p, cx: baseCX + offsetX, cy: baseCY });
      });
    });
  }

  // ============================================================
  //  HOVER DETECTION — distance-based, not hit-test
  // ============================================================
  function findNearest(mx, my){
    var nearest = null, minDist = Infinity;
    for(var i = 0; i < nodeTargets.length; i++){
      var t = nodeTargets[i];
      var dx = mx - t.cx, dy = my - t.cy;
      var d = Math.sqrt(dx * dx + dy * dy);
      if(d < minDist){ minDist = d; nearest = t; }
    }
    if(nearest && minDist <= HOVER_RADIUS){
      return { project: nearest.project, distance: minDist };
    }
    return null;
  }

  function checkInGrid(mx, my){
    var r = gridOuter.getBoundingClientRect();
    return mx >= r.left && mx <= r.right && my >= r.top && my <= r.bottom;
  }

  // ============================================================
  //  CURSOR CARD — update content
  // ============================================================
  function setCard(proj){
    cursorImg.src = proj.coverImage;
    cursorCat.textContent = proj.category;
    cursorTitle.textContent = proj.title;
    cursorDate.textContent = proj.year + ' · ' + CONFIG.months[proj.month - 1];
    cursorDesc.textContent = proj.description;
  }

  // ============================================================
  //  CURSOR ANIMATIONS — all via GSAP
  // ============================================================
  var cardTween = null;

  function cursorEnter(proj, dist){
    if(cardTween){ cardTween.kill(); }
    var t = 1 - Math.min(dist / HOVER_RADIUS, 1);  // 0 (far) → 1 (close)

    cardTween = gsap.timeline();
    cardTween.to(cursorDot, {
      scale: 0.2, opacity: 0,
      duration: 0.22, ease: 'power2.out'
    }, 0);
    cardTween.to(cursorCard, {
      opacity: 1,
      clipPath: 'circle(280px at 50% 50%)',
      scale: 0.72 + t * 0.28,
      duration: 0.35, ease: 'power2.out'
    }, 0.04);
  }

  function cursorLeave(){
    if(cardTween){ cardTween.kill(); }
    cardTween = gsap.timeline();
    cardTween.to(cursorCard, {
      opacity: 0,
      clipPath: 'circle(4px at 50% 50%)',
      scale: 0.4,
      duration: 0.28, ease: 'power2.in'
    }, 0);
    cardTween.to(cursorDot, {
      scale: 1, opacity: 1,
      duration: 0.22, ease: 'power2.out'
    }, 0.08);
  }

  function cursorUpdateDistance(dist){
    var t = 1 - Math.min(dist / HOVER_RADIUS, 1);
    gsap.to(cursorCard, {
      scale: 0.72 + t * 0.28,
      duration: 0.25, ease: 'power2.out',
      overwrite: 'auto'
    });
  }

  // ============================================================
  //  CROSSHAIR — thin rules across the grid
  // ============================================================
  function updateCrosshair(mx, my){
    var r = gridOuter.getBoundingClientRect();
    crosshairH.style.top  = (my - r.top)  + 'px';
    crosshairV.style.left = (mx - r.left) + 'px';
  }

  // ============================================================
  //  SECTION BOUNDARY — is mouse inside the timeline section?
  // ============================================================
  function checkInSection(mx, my){
    var r = timelineSec.getBoundingClientRect();
    return mx >= r.left && mx <= r.right && my >= r.top && my <= r.bottom;
  }

  // ============================================================
  //  MAIN LOOP — requestAnimationFrame @ 60fps (section-aware)
  // ============================================================
  var tlLoopRunning = false;

  function startTlLoop(){
    if(tlLoopRunning) return;
    tlLoopRunning = true;
    rafId = requestAnimationFrame(loop);
  }

  function stopTlLoop(){
    tlLoopRunning = false;
    if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
    // Hide cursor when stopping
    gsap.to(cursorEl, { opacity: 0, duration: 0.12, overwrite: 'auto' });
    gsap.to(crosshair, { opacity: 0, duration: 0.25, overwrite: 'auto' });
    if(activeProject !== null){
      activeProject = null;
      cursorLeave();
    }
    isInSection = false;
  }

  function loop(){
    // Lerp cursor for inertia
    cursorX += (mouseX - cursorX) * LERP_FACTOR;
    cursorY += (mouseY - cursorY) * LERP_FACTOR;
    cursorEl.style.transform = 'translate3d(' + cursorX + 'px,' + cursorY + 'px,0)';

    // ---- Section-bound cursor visibility ----
    var inSection = checkInSection(mouseX, mouseY);

    if(!inSection){
      // Left (or outside) timeline section → stop loop, hide cursor
      stopTlLoop();
      return;
    }

    if(inSection && !isInSection){
      // Just entered timeline section — snap cursor to avoid lerp jump
      isInSection = true;
      cursorX = mouseX;
      cursorY = mouseY;
      cursorEl.style.transform = 'translate3d(' + cursorX + 'px,' + cursorY + 'px,0)';
      gsap.to(cursorEl, { opacity: 1, duration: 0.12, overwrite: 'auto' });
    }

    // ---- Inside section: grid interaction ----
    // Refresh node positions periodically (handles horizontal scroll)
    nodeUpdateTicker = (nodeUpdateTicker + 1) % 8;
    if(nodeUpdateTicker === 0){ updateNodeTargets(); }

    isInGrid = checkInGrid(mouseX, mouseY);

    var result = null;
    if(isInGrid){ result = findNearest(mouseX, mouseY); }

    // ---- State machine ----
    if(result && activeProject === null){
      // → Enter hover
      activeProject = result.project;
      setCard(activeProject);
      cursorEnter(activeProject, result.distance);
      gsap.to(crosshair, { opacity: 0.6, duration: 0.2 });
    } else if(result && activeProject === result.project){
      // → Stay (distance may change)
      cursorUpdateDistance(result.distance);
    } else if(result && activeProject !== result.project){
      // → Switch to different project
      activeProject = result.project;
      setCard(activeProject);
      cursorEnter(activeProject, result.distance);
    } else if(!result && activeProject !== null){
      // → Leave
      activeProject = null;
      cursorLeave();
      gsap.to(crosshair, { opacity: 1, duration: 0.25 });
    }

    // Crosshair visibility
    if(isInGrid){
      updateCrosshair(mouseX, mouseY);
      if(!result){
        gsap.to(crosshair, { opacity: 1, duration: 0.25, overwrite: 'auto' });
      }
    } else {
      gsap.to(crosshair, { opacity: 0, duration: 0.35, overwrite: 'auto' });
    }

    rafId = requestAnimationFrame(loop);
  }

  // Restart loop on mousemove (when user might re-enter timeline section)
  document.addEventListener('mousemove', function(e){
    if(!tlLoopRunning && checkInSection(e.clientX, e.clientY)){
      startTlLoop();
    }
  }, { passive: true });

  // ============================================================
  //  EVENT HANDLERS
  // ============================================================
  function onMouseMove(e){
    mouseX = e.clientX;
    mouseY = e.clientY;
  }

  // ============================================================
  //  INIT — runs when DOM is fully parsed
  // ============================================================
  function init(){
    buildGrid();
    placeNodes();
    updateNodeTargets();

    // Cursor hidden until user enters timeline section
    cursorEl.style.opacity = '0';
    cursorEl.style.transform = 'translate3d(' + cursorX + 'px,' + cursorY + 'px,0)';

    document.addEventListener('mousemove', onMouseMove, { passive: true });

    window.addEventListener('resize', function(){
      updateNodeTargets();
    });

    // RAF starts on demand (when mouse enters timeline section)
    // Initial mousemove listener added at loop definition above

    console.log(
      '%c Timeline Map %c Active %c— ' + CONFIG.years.length + 'yr · ' + projects.length + ' projects',
      'font-weight:600;','color:#666;','color:#999;'
    );
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

<!-- ==========================================================
     ORBIT SYSTEM — Mechanical Pen Orbit (Section 3)
     ========================================================== -->
<script>
(function(){
  'use strict';

  // ============================================================
  //  CONFIG — all tunable parameters in one place
  // ============================================================
  var CFG = {
    // ---- Orbit (circle in 3D plane, CSS perspective → elliptical projection) ----
    radiusScale: 0.62,// ← 轨道半径 = 窗口宽度 × 这个比例
    ratioY:  1.0,     // ← 1.0 = 正圆（CSS rotateX 自动产生椭圆透视）
    pivotOffsetX: 100,// ← px，圆心在右边缘外侧的距离

    // ---- 3D Plane ----
    tiltAngle: 55,    // ← 度°，rotateX 倾斜角（0=俯视 · 55=桌面斜角 · 90=平视）
    pCorrect: 1.75,   // ← Y轴透视补偿（≈ 1/cos(tiltAngle)），越大上方越灵敏

    // ---- Motion ----
    lerpFactor: 0.07, // angle inertia (0.03=heavy lag · 0.15=snappy)

    // ---- Depth (artistic enhancement, CSS perspective handles geometry) ----
    depthScaleMin: 0.88,  // scale at far side
    depthScaleMax: 1.0,   // scale at near side
    depthOpacityMin: 0.55,// opacity at far side
    depthOpacityMax: 1.0, // opacity at near side

    // ---- Pen Logo ----
    // Base (top of SVG) fixed at pivot.  Nib (bottom) traces the orbit.
    penOriginX: '50%',    // SVG anchor X (%)
    penOriginY: '100%',   // SVG anchor Y — bottom = base of pen = fixed at pivot
    penBaseWidth: 28,     // px — rendered width at scale 1 (height ≈ width × 4)

    // ---- Circles ----
    outerScale: 1.35,  // ← 外层圆轨道半径 = 笔尖半径 × 这个比例
    outerOffset: -4,  // ← 度°，外层圆逆时针偏移（负=逆时针 · 正=顺时针）
    outerRadius: 64,    // px — 外层圆大小
    circleRadius: 14,  // px — 反向圆大小

    // ---- Visual ----
    armColor: '#000',
    armWidth: 1,
    orbitColor: 'transparent',
    orbitWidth: 0,
    pivotSize: 3,
    pivotColor: 'rgba(0,0,0,0.25)',
  };

  // ============================================================
  //  MODULE: PointerController
  //  Reads mouse position → computes target angle from pivot
  // ============================================================
  var mouseX = 0, mouseY = 0;

  function onPointerMove(e){
    mouseX = e.clientX;
    mouseY = e.clientY;
  }

  function getTargetAngle(pivotCX, pivotCY){
    var raw = Math.atan2(mouseY - pivotCY, mouseX - pivotCX);
    // Clamp to left semicircle: [π/2, 3π/2]  (cos < 0 → pen stays left of pivot)
    if(raw > -Math.PI/2 && raw < Math.PI/2){
      raw = (raw >= 0) ? Math.PI/2 : -Math.PI/2;
    }
    if(raw < Math.PI/2) raw += 2 * Math.PI; // normalize to [π/2, 3π/2]
    return raw;
  }

  // ============================================================
  //  MODULE: OrbitSystem
  //  Lerps current angle → target angle
  //  Computes ellipse positions + depth cues
  // ============================================================
  var currentAngle = 0;

  function lerpAngle(target){
    // Normalize delta to shortest path
    var delta = target - currentAngle;
    while(delta >  Math.PI) delta -= 2 * Math.PI;
    while(delta < -Math.PI) delta += 2 * Math.PI;
    currentAngle += delta * CFG.lerpFactor;
    return currentAngle;
  }

  function getOrbitPosition(angle, rx, ry){
    return {
      x: Math.cos(angle) * rx,
      y: Math.sin(angle) * ry
    };
  }

  // depth: -1 (far) to +1 (near). We use sin(angle) mapped so
  // the "bottom" of the ellipse (toward viewer) reads as near.
  function getDepth(angle){
    return Math.sin(angle); // -1..+1
  }

  function depthToScale(depth){
    var t = (depth + 1) / 2; // 0..1
    return CFG.depthScaleMin + (CFG.depthScaleMax - CFG.depthScaleMin) * t;
  }

  function depthToOpacity(depth){
    var t = (depth + 1) / 2;
    return CFG.depthOpacityMin + (CFG.depthOpacityMax - CFG.depthOpacityMin) * t;
  }

  function depthIsFront(depth){
    return depth > 0; // bottom half = front
  }

  // ============================================================
  //  MODULE: PenLogo
  //  Computes pen transform (position + rotation)
  // ============================================================
  function getPenRotation(penX, penY, pivotCX, pivotCY){
    // Pen body points outward from pivot (radial direction)
    return Math.atan2(penY - pivotCY, penX - pivotCX);
  }

  // ============================================================
  //  MODULE: OrbitRenderer
  //  Applies transforms to DOM elements each frame
  //  Pivot is at the RIGHT EDGE of the scene. All positions are
  //  expressed in scene-local coordinates (origin = scene top-left).
  // ============================================================
  var sceneEl, ringSvg, ellipseEl;
  var pivotEl, outerEl, circleEl, penEl;
  var pivotSceneX, pivotSceneY; // pivot position in scene coords

  function cacheDom(){
    sceneEl   = document.getElementById('orbit-scene');
    ringSvg   = document.getElementById('orbit-ring-svg');
    ellipseEl = document.getElementById('orbit-ellipse');
    pivotEl   = document.getElementById('orbit-pivot');
    outerEl   = document.getElementById('orbit-outer');
    circleEl  = document.getElementById('orbit-circle');
    penEl     = document.getElementById('orbit-pen');
  }

  function resizeOrbit(){
    if(!sceneEl) return;
    var w = sceneEl.clientWidth;
    var h = sceneEl.clientHeight;
    var rx = w * CFG.radiusScale;
    var ry = rx * CFG.ratioY;
    CFG.radiusX = rx;
    CFG.radiusY = ry;

    // Pivot in scene coordinates: beyond right edge
    pivotSceneX = w + CFG.pivotOffsetX;
    pivotSceneY = h / 2;

    // Position ring SVG with its center at the pivot
    var pad = Math.max(rx, ry) + 60;
    if(ringSvg){
      ringSvg.setAttribute('viewBox', [-pad, -pad, pad*2, pad*2].join(' '));
      ringSvg.style.width  = (pad*2) + 'px';
      ringSvg.style.height = (pad*2) + 'px';
      ringSvg.style.left = (w + CFG.pivotOffsetX) + 'px';
      ringSvg.style.top  = (h / 2) + 'px';
    }

    // Update ellipse SVG attributes
    if(ellipseEl){
      ellipseEl.setAttribute('rx', rx);
      ellipseEl.setAttribute('ry', ry);
    }

    // Apply 3D tilt
    sceneEl.style.transform = 'rotateX(' + CFG.tiltAngle + 'deg)';
  }

  function render(angle){
    var rx = CFG.radiusX;
    var ry = CFG.radiusY;

    // ---- Ray from pivot → mouse, clamped to [π/2, 2π) = 270° range ----
    var penDir = Math.atan2((mouseY - pivotVpCY) * CFG.pCorrect, mouseX - pivotVpCX);
    if(penDir < 0) penDir += 2*Math.PI;        // normalize to [0, 2π)
    if(penDir < Math.PI/2) penDir = Math.PI/2; // floor at 90° (straight down)

    // ---- Pen tip = intersection of ray with orbit ellipse ----
    var cosA = Math.cos(penDir);
    var sinA = Math.sin(penDir);
    var t = 1 / Math.sqrt(
      (cosA*cosA)/(rx*rx) + (sinA*sinA)/(ry*ry)
    );
    var tipX = cosA * t;  // orbit-relative
    var tipY = sinA * t;

    // Opposite side = circle position
    var circX = -tipX;
    var circY = -tipY;

    // Convert to scene coords
    var circSceneX = pivotSceneX + circX;
    var circSceneY = pivotSceneY + circY;

    // Depth (pen direction sine)
    var penDepth  = sinA;
    var circDepth = -sinA;

    // ---- Pivot dot (right edge, vertical center) ----
    if(pivotEl){
      pivotEl.style.left = (pivotSceneX - CFG.pivotSize/2) + 'px';
      pivotEl.style.top  = (pivotSceneY - CFG.pivotSize/2) + 'px';
    }

    // ---- Outer circle (offset angle from pen, larger radius) ----
    if(outerEl){
      var outerAngle = penDir + CFG.outerOffset * Math.PI / 180;
      var oc = Math.cos(outerAngle);
      var os = Math.sin(outerAngle);
      var ot = 1 / Math.sqrt((oc*oc)/(rx*rx) + (os*os)/(ry*ry));
      var outerX = oc * ot * CFG.outerScale;
      var outerY = os * ot * CFG.outerScale;
      var outerSceneX = pivotSceneX + outerX;
      var outerSceneY = pivotSceneY + outerY;
      var ous = depthToScale(penDepth);
      var ouo = depthToOpacity(penDepth);
      var ouz = depthIsFront(penDepth) ? 2 : 1;
      var our = CFG.outerRadius;
      outerEl.style.width  = (our * 2) + 'px';
      outerEl.style.height = (our * 2) + 'px';
      outerEl.style.left   = '0px';
      outerEl.style.top    = '0px';
      outerEl.style.transform = 'translate3d(' + (outerSceneX - our) + 'px,' + (outerSceneY - our) + 'px,0) scale(' + ous + ')';
      outerEl.style.opacity = ouo;
      outerEl.style.zIndex = ouz;
      // Color cycles with angle (HSL hue rotation)
      var hue = ((penDir / (2*Math.PI)) * 360 + 180) % 360;
      outerEl.style.background = 'hsl(' + hue.toFixed(0) + ', 60%, 25%)';
    }

    // ---- Circle (opposite of pen tip) ----
    if(circleEl){
      var cs = depthToScale(circDepth);
      var co = depthToOpacity(circDepth);
      var cz = depthIsFront(circDepth) ? 3 : 1;
      var cr = CFG.circleRadius;
      circleEl.style.width  = (cr * 2) + 'px';
      circleEl.style.height = (cr * 2) + 'px';
      circleEl.style.left   = '0px';
      circleEl.style.top    = '0px';
      circleEl.style.transform = 'translate3d(' + (circSceneX - cr) + 'px,' + (circSceneY - cr) + 'px,0) scale(' + cs + ')';
      circleEl.style.opacity = co;
      circleEl.style.zIndex = cz;
      // Opposite hue
      circleEl.style.background = 'hsl(' + ((hue + 180) % 360).toFixed(0) + ', 60%, 25%)';
    }

    // ---- Pen (base at pivot, tip on ellipse, aiming toward mouse) ----
    if(penEl){
      var ps = depthToScale(penDepth);
      var po = depthToOpacity(penDepth);
      var pz = depthIsFront(penDepth) ? 3 : 1;

      var penImg = document.getElementById('orbit-pen-svg');
      var penBaseH = penImg ? (penImg.offsetHeight || CFG.penBaseWidth * 4) : CFG.penBaseWidth * 4;
      var penScale = t / Math.max(penBaseH, 1);

      // SVG flipped: nib at TOP (↑)
      var rotDeg = (penDir + Math.PI / 2) * (180 / Math.PI);

      penEl.style.left = '0px';
      penEl.style.top  = '0px';
      penEl.style.transformOrigin = CFG.penOriginX + ' ' + CFG.penOriginY;
      penEl.style.transform = 'translate3d(' + pivotSceneX + 'px,' + pivotSceneY + 'px,0) rotate(' + rotDeg + 'deg) scale(' + (penScale * ps) + ')';
      penEl.style.opacity = po;
      penEl.style.zIndex = pz;
    }

  }

  // ============================================================
  //  MAIN LOOP (section-aware — only runs when orbit is visible)
  // ============================================================
  var rafId = null;
  var orbitRunning = false;
  var pivotVpCX = 0, pivotVpCY = 0; // pivot in viewport coords (for mouse angle)

  function startOrbitLoop(){
    if(orbitRunning) return;
    orbitRunning = true;
    updatePivotViewport();
    rafId = requestAnimationFrame(loop);
  }

  function stopOrbitLoop(){
    orbitRunning = false;
    if(rafId){ cancelAnimationFrame(rafId); rafId = null; }
  }

  function updatePivotViewport(){
    if(!sceneEl) return;
    var rect = sceneEl.getBoundingClientRect();
    pivotVpCX = rect.right + CFG.pivotOffsetX;  // beyond right edge
    pivotVpCY = rect.top + rect.height / 2;     // vertical center
  }

  function loop(){
    updatePivotViewport();
    var target = getTargetAngle(pivotVpCX, pivotVpCY);
    var angle  = lerpAngle(target);
    render(angle);
    rafId = requestAnimationFrame(loop);
  }

  // ============================================================
  //  INIT
  // ============================================================
  function init(){
    cacheDom();
    resizeOrbit();

    if(penEl){
      penEl.style.transformOrigin = CFG.penOriginX + ' ' + CFG.penOriginY;
    }
    if(ellipseEl){
      ellipseEl.setAttribute('stroke', CFG.orbitColor);
      ellipseEl.setAttribute('stroke-width', CFG.orbitWidth);
    }

    document.addEventListener('mousemove', onPointerMove, { passive: true });
    window.addEventListener('resize', resizeOrbit);

    // Only run RAF when orbit section is visible (IntersectionObserver)
    var orbitSection = document.querySelector('.orbit-section');
    if(orbitSection && window.IntersectionObserver){
      var observer = new IntersectionObserver(function(entries){
        if(entries[0].isIntersecting){
          updatePivotViewport();
          startOrbitLoop();
        } else {
          stopOrbitLoop();
        }
      }, { threshold: 0 });
      observer.observe(orbitSection);
    } else {
      // Fallback: always run (old behavior)
      updatePivotViewport();
      startOrbitLoop();
    }

    console.log('%c Orbit System %c Active %c— Right-edge Pivot · 180° Left Arc',
      'font-weight:600;','color:#666;','color:#999;');
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
