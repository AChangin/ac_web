<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Library Manager — AC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',-apple-system,sans-serif;font-size:13px;background:#1a1a1a;color:#ccc;-webkit-font-smoothing:antialiased}
.toolbar{height:36px;display:flex;align-items:center;gap:8px;padding:0 12px;background:#252525;border-bottom:1px solid #333;flex-shrink:0}
.toolbar button{background:#333;color:#ccc;border:1px solid #444;padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.toolbar button:hover{background:#444;color:#fff}
.toolbar button.primary{background:#8b0000;border-color:#8b0000;color:#fff}
.toolbar button.green{background:#1a3a1a;border-color:#2a5a2a;color:#8c8}
.toolbar span{font-size:11px;color:#888}
.toolbar .sep{width:1px;height:18px;background:#333;margin:0 4px}

.main{display:flex;flex:1;height:calc(100vh - 36px);overflow:hidden}

/* ═══ LEFT: Asset Browser ═══ */
.panel-left{width:200px;flex-shrink:0;background:#1e1e1e;border-right:1px solid #333;display:flex;flex-direction:column;overflow-y:auto}
.panel-left h3{padding:12px 12px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#666;display:flex;justify-content:space-between;align-items:center}
.panel-left h3 button{font-size:10px;background:none;border:1px solid #444;color:#888;padding:1px 6px;border-radius:3px;cursor:pointer}
.panel-left h3 button:hover{color:#fff;border-color:#888}
.asset-item{display:flex;align-items:center;gap:8px;padding:6px 12px;cursor:pointer;font-size:11px;color:#888;border:none;background:none;text-align:left;font-family:inherit;width:100%}
.asset-item:hover{background:#2a2a2a;color:#ccc}
.asset-item.selected{background:#2a1a1a;color:#fff}
.asset-item .ai-icon{width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:3px;background:#2a2a2a;font-size:10px;flex-shrink:0}
.asset-section{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;padding:8px 12px 2px}
.asset-empty{color:#444;font-size:10px;padding:4px 12px}

/* ═══ CENTER: Definition Editor ═══ */
.panel-center{width:380px;flex-shrink:0;background:#1e1e1e;border-right:1px solid #333;display:flex;flex-direction:column;overflow-y:auto}
.panel-center h3{padding:12px 12px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#666}
.editor-empty{padding:20px 12px;color:#444;font-size:11px;text-align:center}
.editor-form{padding:0 12px 16px}
.editor-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.editor-row label{width:72px;flex-shrink:0;font-size:9px;text-transform:uppercase;letter-spacing:0.04em;color:#666;text-align:right}
.editor-row input,.editor-row textarea,.editor-row select{flex:1;background:#2a2a2a;border:1px solid #333;color:#ccc;padding:4px 6px;border-radius:3px;font-size:11px;font-family:inherit;min-width:0}
.editor-row input:focus,.editor-row textarea:focus,.editor-row select:focus{outline:none;border-color:#8b0000}
.editor-row textarea{resize:vertical;min-height:40px}
.editor-row select{appearance:none;cursor:pointer}
.editor-sec{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;padding:10px 12px 3px}
.editor-btns{display:flex;gap:6px;padding:8px 12px 16px}
.editor-btns button{padding:5px 14px;border-radius:4px;font-size:11px;cursor:pointer;font-family:inherit}
.editor-btns .btn-save{background:#8b0000;color:#fff;border:1px solid #8b0000}
.editor-btns .btn-del{background:#3a1111;color:#c44;border:1px solid #522}

/* ═══ RIGHT: Preview ═══ */
.panel-right{flex:1;background:#000;display:flex;flex-direction:column;overflow:hidden;min-width:300px}
.panel-right h3{padding:12px 14px 6px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#555;flex-shrink:0}
.preview-stage{flex:1;position:relative;overflow:hidden}
.preview-el{position:absolute;pointer-events:none}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<div class="toolbar">
  <span>Library Manager</span>
  <div class="sep"></div>
  <button id="btn-new-comp" class="green">+ New Component</button>
  <button id="btn-export-all">Export All</button>
  <button id="btn-save-all" class="primary" title="Save all library files to disk via Node.js server">Save to Disk</button>
  <span style="flex:1"></span>
  <a href="editor.html" style="color:#888;font-size:11px;text-decoration:none">← Editor</a>
</div>

<div class="main">
  <!-- LEFT: Asset Browser -->
  <div class="panel-left">
    <h3>Components <button id="btn-new-comp2">+</button></h3>
    <div id="comp-list"><div class="asset-empty">Loading...</div></div>
    <div class="asset-section">Animations</div>
    <div id="anim-list"><div class="asset-empty">Loading...</div></div>
    <div class="asset-section">Effects</div>
    <div id="fx-list"><div class="asset-empty">Loading...</div></div>
  </div>

  <!-- CENTER: Definition Editor -->
  <div class="panel-center">
    <h3>Definition Editor</h3>
    <div class="editor-empty" id="editor-empty">Select a component to edit</div>
    <div class="editor-form" id="editor-form" style="display:none"></div>
  </div>

  <!-- RIGHT: Preview -->
  <div class="panel-right">
    <h3>Preview</h3>
    <div class="preview-stage" id="preview-stage"></div>
  </div>
</div>

<script src="js/library-data.js"></script>
<script>
(function(){
'use strict';

// ═══ STATE ═══
var components=[],animations=[],effects=[];
var selectedId=null,selectedCategory='component';
var editingData=null;

// ═══ DOM ═══
var compList=document.getElementById('comp-list');
var editorEmpty=document.getElementById('editor-empty');
var editorForm=document.getElementById('editor-form');
var previewStage=document.getElementById('preview-stage');

// ═══ LOAD ═══
function loadLibrary(){
  ACLibrary.loadAllComponents().then(function(c){components=c;renderCategoryList('comp-list',components,'component')}).catch(function(e){document.getElementById('comp-list').innerHTML='<div class="asset-empty">Failed</div>'});
  ACLibrary.loadAllAnimations().then(function(a){animations=a;renderCategoryList('anim-list',animations,'animation')}).catch(function(){document.getElementById('anim-list').innerHTML='<div class="asset-empty">Failed</div>'});
  ACLibrary.loadAllEffects().then(function(e){effects=e;renderCategoryList('fx-list',effects,'effect')}).catch(function(){document.getElementById('fx-list').innerHTML='<div class="asset-empty">Failed</div>'});
}
function renderCategoryList(listId,items,category){
  var el=document.getElementById(listId);if(!el)return;
  el.innerHTML='';
  items.forEach(function(item){
    var div=document.createElement('div');
    div.className='asset-item'+(item.id===selectedId&&selectedCategory===category?' selected':'');
    div.innerHTML='<span class="ai-icon">'+(item.icon||item.name.slice(0,1))+'</span>'+(item.name||item.id);
    div.addEventListener('click',function(){selectItem(item.id,category)});
    el.appendChild(div);
  });
  if(!items.length)el.innerHTML='<div class="asset-empty">None</div>';
}
function selectItem(id,category){
  selectedId=id;selectedCategory=category;
  var list=category==='component'?components:category==='animation'?animations:effects;
  var item=list.find(function(x){return x.id===id});
  if(!item)return;
  editingData=JSON.parse(JSON.stringify(item));
  renderAllLists();
  renderEditor();
  renderPreview();
}
function renderAllLists(){renderCategoryList('comp-list',components,'component');renderCategoryList('anim-list',animations,'animation');renderCategoryList('fx-list',effects,'effect')}

// ═══ BROWSER ═══
function renderBrowser(){
  compList.innerHTML='';
  components.forEach(function(c){
    var el=document.createElement('div');
    el.className='asset-item'+(c.id===selectedId?' selected':'');
    el.innerHTML='<span class="ai-icon">'+(c.icon||'?')+'</span>'+(c.name||c.id);
    el.addEventListener('click',function(){selectComponent(c.id)});
    compList.appendChild(el);
  });
  if(!components.length) compList.innerHTML='<div class="asset-empty">No components</div>';
}

function selectComponent(id){
  selectedId=id;
  var c=components.find(function(x){return x.id===id});
  if(!c)return;
  editingData=JSON.parse(JSON.stringify(c));
  renderBrowser();
  renderEditor();
  renderPreview();
}

// ═══ EDITOR ═══
function renderEditor(){
  if(!editingData){editorEmpty.style.display='';editorForm.style.display='none';return}
  editorEmpty.style.display='none';editorForm.style.display='';
  var d=editingData;
  var defs=d.defaults||{};
  var h='';
  h+='<div class="editor-sec">Metadata</div>';
  h+=row('id',d.id,'text');
  h+=row('name',d.name,'text');
  h+=row('type',d.type,'text');
  h+=rowArea('description',d.description||'');
  h+='<div class="editor-sec">Defaults — '+d.type+'</div>';
  // Common
  if(defs.x!==undefined)h+=row('x',defs.x,'text');
  if(defs.y!==undefined)h+=row('y',defs.y,'text');
  if(defs.width!==undefined)h+=row('width',defs.width,'text');
  if(defs.height!==undefined)h+=row('height',defs.height,'text');
  if(defs.zIndex!==undefined)h+=row('zIndex',defs.zIndex,'number');
  if(defs.opacity!==undefined)h+=row('opacity',defs.opacity,'number');
  // Text
  if(d.type==='text'){
    h+=rowArea('content',defs.content||'');
    h+=row('fontFamily',defs.fontFamily,'text');
    h+=row('fontSize',defs.fontSize,'text');
    h+=row('fontWeight',defs.fontWeight,'text');
    h+=row('color',defs.color,'text');
    h+=row('lineHeight',defs.lineHeight,'number');
    h+=row('letterSpacing',defs.letterSpacing,'text');
    h+=row('textAlign',defs.textAlign,'text');
  }
  // Image
  if(d.type==='image'){
    h+=row('src',defs.src,'text');
    h+=row('objectFit',defs.objectFit,'text');
  }
  // SVG
  if(d.type==='svg'){
    h+=row('src',defs.src,'text');
    h+=row('svgColor',defs.svgColor,'text');
    h+=row('svgFill',defs.svgFill,'text');
    h+=row('svgStroke',defs.svgStroke,'text');
  }
  h+=row('background',defs.background,'text');
  h+=row('borderRadius',defs.borderRadius,'text');
  h+='<div class="editor-btns"><button class="btn-save" id="btn-save-comp">Save to Disk</button><button class="btn-del" id="btn-del-comp">Delete</button></div>';
  editorForm.innerHTML=h;
  // Bind events
  document.getElementById('btn-save-comp').addEventListener('click',saveComponent);
  document.getElementById('btn-del-comp').addEventListener('click',deleteComponent);
  editorForm.querySelectorAll('input,textarea').forEach(function(inp){
    var key=inp.getAttribute('data-key');
    inp.addEventListener('input',function(){
      var v=inp.value;
      if(inp.type==='number')v=v===''?undefined:parseFloat(v);
      // Determine if key is in defaults or top-level
      var defKeys=Object.keys(editingData.defaults||{});
      if(defKeys.indexOf(key)>=0){ editingData.defaults[key]=v }
      else{ editingData[key]=v }
      if(['x','y','width','height','fontSize','color','content','src','fontFamily','fontWeight','opacity','background','borderRadius','objectFit'].indexOf(key)>=0){
        renderPreview();
      }
    });
  });
}

function row(l,v,t){var val=v!==undefined&&v!==null?String(v):'';return'<div class="editor-row"><label>'+l+'</label><input data-key="'+l+'" type="'+(t||'text')+'" value="'+esc(val)+'"></div>'}
function rowArea(l,v){return'<div class="editor-row"><label>'+l+'</label><textarea data-key="'+l+'">'+esc(v||'')+'</textarea></div>'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function getList(){return selectedCategory==='component'?components:selectedCategory==='animation'?animations:effects}
function saveComponent(){
  if(!editingData)return;
  var list=getList();var idx=list.findIndex(function(c){return c.id===editingData.id});
  if(idx>=0)list[idx]=JSON.parse(JSON.stringify(editingData));
  else{list.push(JSON.parse(JSON.stringify(editingData)));selectedId=editingData.id}
  var idxData={components:components.map(function(c){return c.id}),animations:animations.map(function(a){return a.id}),effects:effects.map(function(e){return e.id})};
  var d={id:editingData.id,name:editingData.name,category:editingData.category||selectedCategory,type:editingData.type,description:editingData.description,defaults:editingData.defaults};
  Promise.all([apiPost('/api/save-library-index',{data:idxData}),apiPost('/api/save-library-component',{id:editingData.id,data:d})]).then(function(){renderAllLists();renderPreview()}).catch(function(e){alert('Save to disk failed: '+e.message)})}

function deleteComponent(){
  if(!editingData||!confirm('Delete "'+editingData.name+'"?\n\nExisting projects are not affected.'))return;
  var list=getList();var idx=list.findIndex(function(c){return c.id===editingData.id});
  if(idx>=0)list.splice(idx,1);
  selectedId=null;editingData=null;renderAllLists();editorEmpty.style.display='';editorForm.style.display='none';previewStage.innerHTML='';
}

// ═══ NEW COMPONENT ═══
function newComponent(){
  var id=prompt('Component id (unique):','new-comp');if(!id)return;
  if(components.find(function(c){return c.id===id})){alert('id already exists.');return}
  var nc={id:id,name:'New Component',category:'component',type:'text',icon:'?',description:'',defaults:{type:'text',content:'New text',x:'10vw',y:'10vh',width:'30vw',fontFamily:"'Inter',sans-serif",fontSize:'2vw',fontWeight:'400',color:'#fff',zIndex:2}};
  components.push(nc);selectedId=id;editingData=JSON.parse(JSON.stringify(nc));renderBrowser();renderEditor();renderPreview();
}
document.getElementById('btn-new-comp').addEventListener('click',newComponent);
document.getElementById('btn-new-comp2').addEventListener('click',newComponent);

// ═══ PREVIEW ═══
function u(v){return typeof v==='number'?v+'px':v}
function numVal(v){if(typeof v==='number')return v;if(typeof v==='string'){var n=parseFloat(v);if(!isNaN(n)){if(v.endsWith('vw'))return n*window.innerWidth/100;if(v.endsWith('vh'))return n*window.innerHeight/100;if(v.endsWith('rem'))return n*16;if(v.endsWith('px'))return n;return n}}return 0}
function renderPreview(){
  previewStage.innerHTML='';
  if(!editingData)return;
  var defs=editingData.defaults||{};
  var el=document.createElement('div');el.className='preview-el';
  var x=numVal(defs.x||0),y=numVal(defs.y||0);
  var w=numVal(defs.width||200),h=numVal(defs.height||60);
  el.style.left=x+'px';el.style.top=y+'px';el.style.width=w+'px';el.style.height=h+'px';
  el.style.zIndex=defs.zIndex||1;if(defs.opacity!==undefined)el.style.opacity=defs.opacity;
  if(defs.background)el.style.background=defs.background;
  if(defs.borderRadius)el.style.borderRadius=typeof defs.borderRadius==='number'?defs.borderRadius+'px':defs.borderRadius;
  if(defs.type==='text'){
    if(defs.fontFamily)el.style.fontFamily=defs.fontFamily;
    if(defs.fontSize)el.style.fontSize=typeof defs.fontSize==='number'?defs.fontSize+'px':defs.fontSize;
    if(defs.fontWeight)el.style.fontWeight=defs.fontWeight;
    if(defs.color)el.style.color=defs.color;
    if(defs.lineHeight)el.style.lineHeight=defs.lineHeight;
    if(defs.letterSpacing)el.style.letterSpacing=defs.letterSpacing;
    if(defs.textAlign)el.style.textAlign=defs.textAlign;
    el.innerHTML=defs.content||'';
  }else if(defs.type==='image'){
    el.innerHTML='<img src="'+defs.src+'" style="width:100%;height:100%;object-fit:'+(defs.objectFit||'cover')+';display:block">';
  }else if(defs.type==='svg'){
    if(defs.src){var sf=defs.svgColor||'';el.innerHTML='<img src="'+defs.src+'" style="width:100%;height:100%;'+(sf?'filter:'+sf+';':'')+'display:block">'}
  }else if(defs.type==='group'){
    el.style.border='2px dashed rgba(218,165,32,0.5)';
    el.style.background='rgba(218,165,32,0.1)';
    el.innerHTML='<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(218,165,32,0.6);font-size:12px">Group</div>';
  }
  previewStage.appendChild(el);
}

// ═══ EXPORT ═══
document.getElementById('btn-export-all').addEventListener('click',function(){
  if(!components.length){alert('No components to export.');return}
  var idx={components:components.map(function(c){return c.id}),animations:[],effects:[]};
  var files=[{name:'index.json',data:JSON.stringify(idx,null,2)}];
  components.forEach(function(c){files.push({name:'components/'+c.id+'.json',data:JSON.stringify({
    id:c.id,name:c.name,category:c.category||'component',type:c.type,icon:c.icon,description:c.description,defaults:c.defaults
  },null,2)})});
  // Download as individual files via multiple clicks is bad UX. Bundle as a single JSON with all data.
  var bundle={index:idx,components:{}};
  components.forEach(function(c){bundle.components[c.id]={id:c.id,name:c.name,category:c.category||'component',type:c.type,icon:c.icon,description:c.description,defaults:c.defaults}});
  var blob=new Blob([JSON.stringify(bundle,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='library-export.json';a.click();URL.revokeObjectURL(a.href);
});

// ═══ SAVE TO DISK (Node.js server) ═══
function apiPost(url,data){return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.error||'HTTP '+r.status)});return r.json()})}
function apiDelete(url){return fetch(url,{method:'DELETE'}).then(function(r){if(!r.ok)return r.json().then(function(e){throw new Error(e.error||'HTTP '+r.status)});return r.json()})}

document.getElementById('btn-save-all').addEventListener('click',function(){
  var all=components.concat(animations).concat(effects);
  if(!all.length){alert('Nothing to save.');return}
  var idx={components:components.map(function(c){return c.id}),animations:animations.map(function(a){return a.id}),effects:effects.map(function(e){return e.id})};
  var promises=[apiPost('/api/save-library-index',{data:idx})];
  all.forEach(function(item){
    promises.push(apiPost('/api/save-library-component',{id:item.id,data:{id:item.id,name:item.name,category:item.category||'component',type:item.type,description:item.description,defaults:item.defaults}}));
  });
  Promise.all(promises).then(function(){alert('Saved '+all.length+' items to disk.')}).catch(function(e){alert('Save failed: '+e.message)});
});

// ═══ INIT ═══
loadLibrary();
})();
</script>
</body>
</html>
